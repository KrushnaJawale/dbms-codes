<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        .file-list {
            list-style: none;
            padding: 0;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 10px;
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 8px;
            transition: transform 0.2s;
        }
        .file-item:hover {
            transform: scale(1.02);
            background: #fff;
            border-color: #007bff;
        }
        .file-name {
            font-weight: 500;
            color: #444;
            font-size: 15px;
        }
        .btn-download {
            background-color: #28a745;
            color: white;
            text-decoration: none;
            padding: 6px 15px;
            border-radius: 5px;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-download:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Notebook Repository</h2>
    <div class="file-list">
        <div class="file-item">
            <span class="file-name">Question set 1.ipynb</span>
            <a href="Question set 1.ipynb"  class="btn-download">Download</a>
        </div>
        <div class="file-item">
            <span class="file-name">Question set 2.ipynb</span>
            <a href="Question set 2.ipynb"  class="btn-download">Download</a>
        </div>
        <div class="file-item">
            <span class="file-name">Question set 3.ipynb</span>
            <a href="Question set 3.ipynb"  class="btn-download">Download</a>
        </div>
        <div class="file-item">
            <span class="file-name">Question set 4.ipynb</span>
            <a href="Question set 4.ipynb"  class="btn-download">Download</a>
        </div>
        <div class="file-item">
            <span class="file-name">Question Set 5.ipynb</span>
            <a href="Question Set 5.ipynb"  class="btn-download">Download</a>
        </div>
        <div class="file-item">
            <span class="file-name">Question set 6.ipynb</span>
            <a href="Question set 6.ipynb"  class="btn-download">Download</a>
        </div>
        <div class="file-item">
            <span class="file-name">Question Set 7.ipynb</span>
            <a href="Question Set 7.ipynb"  class="btn-download">Download</a>
        </div>
        <div class="file-item">
            <span class="file-name">Question Set 8.ipynb</span>
            <a href="Question Set 8.ipynb"  class="btn-download">Download</a>
        </div>
    </div>
</div>

</body>
</html>
